version: '3.9'
services:
  api:
    build: .
    container_name: ezcommerce_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
    deploy:
      resources:
        limits:
          memory: 256M
  db:
    image: postgres:15-alpine
    container_name: ezcommerce_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ezcommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
volumes:
  db_data:
